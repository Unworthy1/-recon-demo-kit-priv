<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenRecon — project reconciliation</title>
<link rel="stylesheet" href="assets/app.css?v=1.11.0">
<style>
  .wrap{max-width:1000px;margin:0 auto;padding:30px 26px 60px}
  .back{display:inline-flex;align-items:center;gap:7px;color:var(--muted);text-decoration:none;font-size:13.5px;font-weight:600;margin-bottom:18px}
  .back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
  .head{display:flex;align-items:center;gap:16px;margin-bottom:22px}
  .head .mk{width:48px;height:48px;border-radius:13px;background:var(--grad);display:flex;align-items:center;justify-content:center;color:#fff}
  .head .mk svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:1.8}
  .head h1{font-size:24px;font-weight:700;letter-spacing:-.5px}
  .head .sub{font-size:13.5px;color:var(--muted);margin-top:2px}
  .head .sp{flex:1}
  .tag{font-size:13px;padding:8px 15px;border-radius:22px}
  .src{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 22px;box-shadow:var(--shadow);display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .src .amt{font-size:30px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums}
  .src .lab{font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700}
  .src .doc{margin-left:auto;display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:11px;padding:11px 14px;background:#FAFBFE}
  .src .doc .si{width:36px;height:36px;border-radius:9px;background:#EEF1F8;display:flex;align-items:center;justify-content:center;color:var(--slate);font-weight:800;font-size:11px}
  .src .doc b{font-size:13.5px;font-weight:600;display:block}
  .src .doc span{font-size:12px;color:var(--muted)}
  .src .doc a{font-size:12.5px;font-weight:700;color:var(--pink);text-decoration:none;white-space:nowrap;margin-left:6px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-top:18px;overflow:hidden;box-shadow:var(--shadow)}
  .panel .ph{padding:16px 22px;border-bottom:1px solid var(--line);font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
  .panel .ph span{font-size:12.5px;color:var(--muted);font-weight:600}
  table{width:100%;border-collapse:collapse}
  thead th{font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700;text-align:left;padding:11px 22px;background:#FAFBFE}
  thead th.num{text-align:right}
  tbody td{padding:13px 22px;border-top:1px solid var(--line);font-size:14px}
  td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
  .fb{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;border-radius:13px;padding:3px 9px}
  .fb.cap{color:#185FA5;background:#E6F1FB} .fb.om{color:#0F6E56;background:#E1F5EE} .fb.rev{color:#993C1D;background:#FAECE7} .fb.bs{color:#5F5E5A;background:#F1EFE8}
  tfoot td{padding:14px 22px;border-top:2px solid var(--ink);font-size:14.5px;font-weight:700;font-variant-numeric:tabular-nums}
  .tieout{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 22px;margin-top:18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .tieout.var{border-color:#F3D9A6;background:#FFFCF5}
  .tieout .vamt{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums}
  .tieout .vl{font-size:13px;color:var(--muted);font-weight:600}
  .amber{color:var(--amber)} .green{color:var(--green)}
  .steps{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .stp{flex:1;min-width:120px;border:1px solid var(--line);border-radius:11px;padding:11px 13px;background:#fff}
  .stp.r.ack{border-color:#5A6385;background:#EEF1F8} .stp.r.assigned{border-color:#185FA5;background:#E6F1FB} .stp.r.progress{border-color:#C9790B;background:#FBF0DA} .stp.r.resolved{border-color:#11A150;background:#E7F7EE}
  .stp .t{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700}
  .stp .t{color:var(--muted)} .stp.r .t{color:var(--text)}
  .stp .w{font-size:13px;font-weight:600;margin-top:3px;color:var(--text)}
  .rolesline{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:6px;padding:0 22px 4px}
  .rchip{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:11px;padding:8px 12px;font-size:13px}
  .rchip .rl2{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700}
  .rchip .tg{font-size:11.5px;color:var(--slate);background:var(--slatebg);border-radius:10px;padding:2px 8px}
  .sod{font-size:12px;color:var(--muted);font-weight:600}
  .gate{margin:8px 22px 16px;font-size:13px;font-weight:600;border-radius:10px;padding:10px 13px}
  .gate.g{background:var(--greenbg);color:var(--green)} .gate.b{background:#E6F1FB;color:#185FA5} .gate.p{background:#EEEDFE;color:#534AB7} .gate.m{background:var(--slatebg);color:var(--slate)}
  textarea{width:100%;min-height:64px;border:1px solid var(--line);border-radius:11px;padding:11px 13px;font:inherit;font-size:14px;resize:vertical;margin-top:14px}
  textarea:focus{outline:none;border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,45,120,.12)}
</style>
</head>
<body>
<div class="wrap" id="wrap"></div>
<script src="assets/ferc.js?v=1.11.0"></script>
<script src="assets/app.js?v=1.11.0"></script>
<script>
  const id = new URLSearchParams(location.search).get('id') || RECON.projects[0].id;
  const p = RECON.projects.find(x=>x.id===id) || RECON.projects[0];
  const s = projectSummary(p);
  const tagFor = st => st==='tied' ? '<span class="tag t-ok">Tied out</span>' : '<span class="tag t-var">Variance</span>';
  const etClass = et => et==='Capital'?'cap':et==='O&M'?'om':et==='Revenue'?'rev':'bs';

  const rows = p.lines.map(l=>{
    const c = fercClassify(l.code);
    return `<tr>
      <td><b>${l.code}</b> <span style="color:var(--muted)">· ${l.name}</span></td>
      <td>${c.project}</td>
      <td><span class="fb ${etClass(c.expense_type)}">${c.expense_type||'—'}</span></td>
      <td class="num">${money(l.allocated)}</td>
    </tr>`;
  }).join('');

  const workOrder=['ack','assigned','progress','resolved'];
  const wIdx=workOrder.indexOf(p.work);
  const steps = workOrder.map((w,i)=>`<div class="stp ${i<=wIdx?'r '+w:''}"><div class="t">${i+1}</div><div class="w">${WORK_LABELS[w]}</div></div>`).join('');
  const _prep=p.assigned, _appr=approverFor(p), _rev=reviewerFor(p);
  const _rchip=(who,label,role)=>`<span class="rchip"><span class="rl2">${label}</span><b>${who}</b><span class="tg">${roleLabel(role)}</span></span>`;
  const _g=(()=>{const v=RECON.viewer, vr=viewerRole();
    if(v===_prep) return {t:'You are the <b>preparer</b> of this project reconciliation.', c:'g'};
    if(v===_appr && can(vr,'approve')) return {t:'You are the <b>approver</b> — you may approve the settlement (segregation of duties: not your own prep).', c:'b'};
    if(can(vr,'review')) return {t:'You may <b>review &amp; sign off</b> (Principal / Director).', c:'p'};
    return {t:'View only — you are neither the preparer nor the approver for this project.', c:'m'};})();
  const rolesHtml=`<div class="rolesline">${_rchip(_prep,'Preparer',roleKey(_prep))}${_rchip(_appr,'Approver',roleKey(_appr))}${_rchip(_rev,'Reviewer',roleKey(_rev))}<span class="sod">approver ≠ preparer</span></div><div class="gate ${_g.c}">${_g.t}</div>`;

  const settleBlock = `
    <div class="tieout ${s.status==='variance'?'var':''}" id="tieout">
      <div><div class="vamt ${s.status==='variance'?'amber':'green'}">${money(s.variance)}</div><div class="vl">source expense − allocated</div></div>
      <div style="flex:1"></div>
      ${s.status==='variance'
        ? `<div style="flex:1 1 100%"><textarea id="note" placeholder="Explain the ${money(Math.abs(s.variance))} difference before settling (e.g. retention held, rounding, accrual)"></textarea></div>`
        : `<span class="note" style="font-size:13.5px;color:var(--muted)">Allocations tie to the source within tolerance (${money(p.tol)}).</span>`}
      <button class="btn" id="settleBtn" onclick="settle()"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg>Settle all ${p.lines.length} accounts</button>
    </div>`;

  document.getElementById('wrap').innerHTML = `
    <a class="back" href="projects.html"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>Back to project reconciliations</a>
    <div class="head">
      <div class="mk"><svg viewBox="0 0 24 24"><path d="M3 7l9-4 9 4-9 4-9-4Z"/><path d="M3 12l9 4 9-4M3 17l9 4 9-4"/></svg></div>
      <div><h1>${p.name}</h1><div class="sub">${p.wo} · ${p.source.vendor} · ${p.assigned} · ${p.period}</div></div>
      <div class="sp"></div>
      ${tagFor(s.status)}
    </div>

    <div class="src">
      <div><div class="lab">Source expense</div><div class="amt">${money(p.source.amount)}</div></div>
      <div class="doc"><div class="si">PDF</div><div><b>${p.source.doc}</b><span>${p.source.vendor} · ${p.source.doc_ref} · one document, ${p.lines.length} accounts</span></div><a href="documents.html">Open in DocVault ↗</a></div>
    </div>

    <div class="panel">
      <div class="ph">Allocation across accounts <span>— each line's Project is derived from its FERC account range</span></div>
      <table>
        <thead><tr><th>FERC account</th><th>Project (FERC function)</th><th>Expense type</th><th class="num">Allocated</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr><td colspan="3">Total allocated · ${p.lines.length} accounts across ${s.functions.length} FERC function${s.functions.length>1?'s':''}</td><td class="num">${money(s.allocated)}</td></tr></tfoot>
      </table>
    </div>

    ${settleBlock}

    <div class="panel" style="margin-top:18px"><div class="ph">Work status <span>— preparer → approver → reviewer · one sign-off settles the whole group</span></div>
      <div style="padding:18px 22px 6px"><div class="steps">${steps}</div></div>
      ${rolesHtml}
    </div>
    <div id="thread"></div>`;

  renderThread('thread', 'project', p.id);

  function settle(){
    const t=document.getElementById('tieout');
    t.classList.remove('var');
    t.querySelector('.vamt').className='vamt green';
    t.innerHTML = `<div style="font-size:14px;font-weight:600;color:var(--green)">✓ Settled all ${p.lines.length} accounts under ${p.source.doc_ref} by ${RECON.currentUser} just now — one document, ${p.lines.length} FERC accounts closed together.</div>`;
  }
  window.settle = settle;
</script>
</body>
</html>
