<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenRecon — Audit package</title>
<link rel="stylesheet" href="assets/app.css?v=1.11.0">
<style>
  .sec{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-top:18px;overflow:hidden;box-shadow:var(--shadow)}
  .sec .sh{padding:15px 22px;border-bottom:1px solid var(--line);font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
  .sec .sh span{margin-left:auto;font-size:12.5px;color:var(--muted);font-weight:600}
  td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
  .ref{font-size:12.5px;color:var(--pink);font-weight:700;text-decoration:none}
  .sign{font-size:12.5px;color:var(--muted)}
  .sign b{color:var(--green);font-weight:700}
</style>
</head>
<body>
<div class="app">
  <aside class="side" id="side"></aside>
  <div class="main">
    <header class="top">
      <div><h1>Audit package</h1><div class="crumb" id="crumb"></div></div>
      <div class="sp"></div>
      <button class="btn" onclick="exportPackage()"><svg viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>Export package</button>
      <div class="av2">JB</div>
    </header>
    <div class="body">
      <div class="kpis" id="kpis"></div>
      <div id="binder"></div>
    </div>
  </div>
</div>
<script src="assets/ferc.js?v=1.11.0"></script>
<script src="assets/app.js?v=1.11.0"></script>
<script>
  renderSidebar('audit');
  document.getElementById('crumb').textContent = RECON.fiscalYear + ' · the close binder — every reconciliation, sign-off, and supporting document, exportable for external audit';

  const A=RECON.accounts, P=RECON.projects, R=RECON.rollforward;
  const docCount = A.filter(a=>a.stmt!==null).length + P.length*2 + 1;  // statements + project source + support
  const recTotal = A.length + P.length + R.length;
  const exceptions = A.filter(a=>a.status!=='reconciled').length + P.filter(p=>projectSummary(p).status!=='tied').length + R.filter(r=>Math.abs(r.tie)>ROLLFWD_TOL).length;
  const kd=[
    {lab:'Reconciliations', num:recTotal, cls:'', bg:'var(--slatebg)', stroke:'#5A6385', icon:'<path d="M9 11l3 3 8-8M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/>', foot:`${A.length} account · ${P.length} project · ${R.length} roll-forward`},
    {lab:'Signed off', num:recTotal-exceptions, cls:'g', bg:'var(--greenbg)', stroke:'#11A150', icon:'<path d="M20 6 9 17l-5-5"/>', foot:'tied + approved'},
    {lab:'Open exceptions', num:exceptions, cls:'a', bg:'var(--amberbg)', stroke:'#C9790B', icon:'<path d="M12 9v4m0 4h.01M10.3 4.3 2.4 18a2 2 0 0 0 1.7 3h15.8a2 2 0 0 0 1.7-3L13.7 4.3a2 2 0 0 0-3.4 0Z"/>', foot:'documented in the package', footcls:'a'},
    {lab:'Supporting documents', num:docCount, cls:'', bg:'#EEF1F8', stroke:'#5A6385', icon:'<path d="M14 3v5h5M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-5Z"/>', foot:'OCR evidence linked'},
  ];
  document.getElementById('kpis').innerHTML = kd.map(d=>`
    <div class="kpi" style="cursor:default"><div class="lab">${d.lab}</div>
      <div class="row"><div class="num ${d.cls}">${d.num}</div><div class="chip" style="background:${d.bg}"><svg viewBox="0 0 24 24" stroke="${d.stroke}" fill="none">${d.icon}</svg></div></div>
      <div class="foot ${d.footcls||''}">${d.foot}</div></div>`).join('');

  const stTag = s => s==='reconciled'||s==='tied'?'<span class="tag t-ok">Reconciled</span>':s==='variance'?'<span class="tag t-var">Variance</span>':'<span class="tag t-un">Unreconciled</span>';
  const sign = a => a.work==='resolved'?`<span class="sign"><b>signed off</b> · ${a.assigned}</span>`:`<span class="sign">in ${WORK_LABELS[a.work].toLowerCase()} · ${a.assigned}</span>`;

  const balRows = A.map(a=>`<tr><td><b>${a.code}</b> · ${a.name}</td><td>${stTag(a.status)}</td><td>${sign(a)}</td><td class="num">${money(a.variance)}</td><td><a class="ref" href="account.html?id=${a.id}">${a.status!=='unreconciled'?'STMT-'+a.id:'—'}</a></td></tr>`).join('');
  const projRows = P.map(p=>{const s=projectSummary(p);return `<tr><td><b>${p.name}</b> · ${p.accounts||s.accounts} accts</td><td>${stTag(s.status)}</td><td><span class="sign">${WORK_LABELS[p.work].toLowerCase()} · ${p.assigned}</span></td><td class="num">${money(s.variance)}</td><td><a class="ref" href="project.html?id=${p.id}">${p.source.doc_ref}</a></td></tr>`;}).join('');
  const rfRows = R.map(r=>`<tr><td><b>${r.code}</b> · ${r.name}</td><td>${Math.abs(r.tie)<=ROLLFWD_TOL?stTag('tied'):'<span class="tag t-var">True-up</span>'}</td><td><span class="sign">roll-forward</span></td><td class="num">${money(r.tie)}</td><td><a class="ref" href="yearend.html">continuity</a></td></tr>`).join('');

  const section = (title, n, rows) => `<div class="sec"><div class="sh">${title}<span>${n} items</span></div>
    <table><thead><tr><th>Item</th><th>Status</th><th>Sign-off</th><th class="num">Variance / tie</th><th>Evidence</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  document.getElementById('binder').innerHTML =
    section('Account reconciliations', A.length, balRows) +
    section('Project reconciliations (FERC)', P.length, projRows) +
    section('Year-end roll-forward', R.length, rfRows);

  function exportPackage(){
    const manifest = {
      software:"OpenRecon", entity:"Acme Power & Light, Inc.", fiscal_year:RECON.fiscalYear,
      generated_by:RECON.currentUser, period:"FY 2026",
      summary:{reconciliations:recTotal, signed_off:recTotal-exceptions, open_exceptions:exceptions, supporting_documents:docCount},
      account_reconciliations:A.map(a=>({code:a.code, name:a.name, status:a.status, work_status:a.work, assigned_to:a.assigned, variance:a.variance, evidence:a.status!=='unreconciled'?'STMT-'+a.id:null})),
      project_reconciliations:P.map(p=>{const s=projectSummary(p);return {id:p.id, name:p.name, accounts:s.accounts, ferc_functions:s.functions, source_amount:p.source.amount, allocated:s.allocated, tie_out:s.variance, status:s.status, document:p.source.doc_ref};}),
      year_end_rollforward:R.map(r=>({code:r.code, name:r.name, opening:r.opening, activity:r.activity, closing:r.closing, evidence:r.evidence, tie:r.tie, ferc_project:fercClassify(r.code).project})),
    };
    const blob = new Blob([JSON.stringify(manifest,null,2)], {type:"application/json"});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="OpenRecon_FY2026_audit_package.json"; a.click(); URL.revokeObjectURL(a.href);
  }
  window.exportPackage = exportPackage;
</script>
</body>
</html>
