<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenRecon — Team &amp; roles</title>
<link rel="stylesheet" href="assets/app.css?v=1.9.0">
<style>
  .viewsel{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:10px;padding:7px 11px;background:#fff}
  .viewsel label{font-size:12px;color:var(--muted);font-weight:600}
  .viewsel select{border:none;outline:none;font:inherit;font-size:13.5px;font-weight:600;background:transparent;cursor:pointer}
  .tier{font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--slate);font-weight:700;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
  .tier .t4{color:var(--purple)} .tier .badge2{background:var(--slatebg);color:var(--slate);font-size:11px;border-radius:10px;padding:2px 8px}
  .prow{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--card);border:1px solid var(--line);border-radius:13px;margin-bottom:9px;box-shadow:var(--shadow)}
  .prow .av{width:40px;height:40px;border-radius:50%;background:var(--slatebg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--slate)}
  .prow .nm{font-size:15px;font-weight:700}.prow .rl{font-size:12.5px;color:var(--muted)}
  .caps{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
  .cap{font-size:11px;font-weight:700;padding:4px 10px;border-radius:13px;background:var(--slatebg);color:#A6AEC9}
  .cap.on{background:#E6F1FB;color:#185FA5} .cap.rev.on{background:#EEEDFE;color:#534AB7}
  .wl{display:flex;gap:16px;margin-left:18px;border-left:1px solid var(--line);padding-left:18px}
  .wl div{text-align:center}.wl b{font-size:18px;font-weight:800;display:block;font-variant-numeric:tabular-nums}.wl span{font-size:11px;color:var(--muted);font-weight:600}
  .matrix td,.matrix th{padding:13px 22px;text-align:center;font-size:14px}.matrix th:first-child,.matrix td:first-child{text-align:left;font-weight:700}
  .yes{color:var(--green);font-weight:800} .no{color:#C5CBE0;font-weight:700}
</style>
</head>
<body>
<div class="app">
  <aside class="side" id="side"></aside>
  <div class="main">
    <header class="top">
      <div><h1>Team &amp; roles</h1><div class="crumb">org-role hierarchy gates access; workflow roles (preparer · approver · reviewer) drive assignment with segregation of duties</div></div>
      <div class="sp"></div>
      <div class="viewsel"><label>Viewing as</label><select id="viewas"></select></div>
    </header>
    <div class="body">
      <div class="kpis" id="kpis"></div>
      <div class="panel">
        <div class="ph"><b>Role capabilities</b><span style="margin-left:auto;font-size:12.5px;color:var(--muted);font-weight:600">the org's policy — who can hold each workflow role</span></div>
        <table class="matrix">
          <thead><tr><th>Org role</th><th>Prepare</th><th>Approve</th><th>Review</th></tr></thead>
          <tbody id="matrix"></tbody>
        </table>
      </div>
      <div id="hier"></div>
    </div>
  </div>
</div>
<script src="assets/app.js?v=1.9.0"></script>
<script>
  renderSidebar('team');

  // viewing-as switcher
  const vs = document.getElementById('viewas');
  vs.innerHTML = RECON.team.map(t=>`<option value="${t.name}" ${t.name===RECON.viewer?'selected':''}>${t.name} — ${roleLabel(t.role)}</option>`).join('');
  vs.onchange = () => { setViewer(vs.value); location.reload(); };

  // KPIs
  const byTier = k => RECON.team.filter(t=>t.role===k).length;
  const kd=[
    {lab:'Accountants', num:RECON.team.length, bg:'var(--slatebg)', stroke:'#5A6385', icon:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"/>', foot:'across 4 org tiers'},
    {lab:'Can approve', num:RECON.team.filter(t=>can(t.role,'approve')).length, bg:'#E6F1FB', stroke:'#185FA5', icon:'<path d="M20 6 9 17l-5-5"/>', foot:'seniors and above'},
    {lab:'Can review', num:RECON.team.filter(t=>can(t.role,'review')).length, bg:'#EEEDFE', stroke:'#534AB7', icon:'<path d="M9 11l3 3 8-8M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/>', foot:'principals + directors only'},
    {lab:'Viewing as', num:roleLabel(viewerRole()).split(' ')[0], small:true, bg:'var(--greenbg)', stroke:'#11A150', icon:'<circle cx="12" cy="12" r="3"/><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>', foot:RECON.viewer},
  ];
  document.getElementById('kpis').innerHTML = kd.map(d=>`
    <div class="kpi" style="cursor:default"><div class="lab">${d.lab}</div>
      <div class="row"><div class="num" ${d.small?'style="font-size:22px"':''}>${d.num}</div><div class="chip" style="background:${d.bg}"><svg viewBox="0 0 24 24" stroke="${d.stroke}" fill="none">${d.icon}</svg></div></div>
      <div class="foot">${d.foot}</div></div>`).join('');

  // capability matrix
  const cell = on => on?'<span class="yes">✓</span>':'<span class="no">—</span>';
  document.getElementById('matrix').innerHTML = RECON.roles.map(r=>`
    <tr><td>${r.label}</td><td>${cell(can(r.key,'prepare'))}</td><td>${cell(can(r.key,'approve'))}</td><td>${cell(can(r.key,'review'))}</td></tr>`).join('');

  // hierarchy + workload, grouped by tier (high to low)
  const order=['director','principal','senior','junior'];
  document.getElementById('hier').innerHTML = order.map(rk=>{
    const people = RECON.team.filter(t=>t.role===rk);
    if(!people.length) return '';
    const rows = people.map(t=>{
      const w = workloadFor(t.name);
      const capPill = (a,label,cls='') => `<span class="cap ${cls} ${can(t.role,a)?'on':''}">${label}</span>`;
      return `<div class="prow">
        <div class="av">${t.init}</div>
        <div><div class="nm">${t.name}</div><div class="rl">${roleLabel(t.role)} · <a href="mailto:${emailOf(t.name)}" style="color:var(--muted);text-decoration:none">${emailOf(t.name)}</a></div></div>
        <div class="caps">${capPill('prepare','Preparer')}${capPill('approve','Approver')}${capPill('review','Reviewer','rev')}</div>
        <div class="wl"><div><b>${w.prepares}</b><span>prepares</span></div><div><b>${w.approves}</b><span>approves</span></div><div><b>${w.reviews||'—'}</b><span>reviews</span></div></div>
      </div>`;
    }).join('');
    return `<div class="tier"><span class="${rk==='director'?'t4':''}">${roleLabel(rk)}</span><span class="badge2">tier ${tierOf(rk)}</span></div>${rows}`;
  }).join('');
</script>
</body>
</html>
