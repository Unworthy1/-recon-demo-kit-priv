<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenRecon — My dashboard</title>
<link rel="stylesheet" href="assets/app.css?v=1.11.0">
<style>
  .viewsel{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:10px;padding:7px 11px;background:#fff}
  .viewsel label{font-size:12px;color:var(--muted);font-weight:600}
  .viewsel select{border:none;outline:none;font:inherit;font-size:13.5px;font-weight:600;background:transparent;cursor:pointer}
  .rv{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:13px}
  .rv.pending{background:var(--slatebg);color:var(--slate)} .rv.approved{background:var(--greenbg);color:var(--green)} .rv.sent_back{background:var(--amberbg);color:var(--amber)}
  td.act{text-align:right;white-space:nowrap}
  .mini{font-size:12px;font-weight:700;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 11px;cursor:pointer;margin-left:6px}
  .mini.ap{border-color:#11A150;color:#11A150} .mini.sb{border-color:#C9790B;color:#C9790B}
  .wl b{font-variant-numeric:tabular-nums}
  .frac{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums} .frac span{color:var(--muted);font-weight:600}
</style>
</head>
<body>
<div class="app">
  <aside class="side" id="side"></aside>
  <div class="main">
    <header class="top">
      <div><h1 id="hi"></h1><div class="crumb" id="crumb"></div></div>
      <div class="sp"></div>
      <div class="viewsel"><label>Logged in as</label><select id="viewas"></select></div>
    </header>
    <div class="body">
      <div class="kpis" id="kpis"></div>
      <div id="body"></div>
    </div>
  </div>
</div>
<script src="assets/app.js?v=1.11.0"></script>
<script>
  const _as = new URLSearchParams(location.search).get('as');
  if(_as && RECON.team.find(t=>t.name===_as)) setViewer(_as);
  renderSidebar('home');

  const me = RECON.viewer, role = viewerRole();
  document.getElementById('hi').textContent = `Welcome back, ${me}`;
  document.getElementById('crumb').textContent = `${roleLabel(role)} · May 2026 close · your assigned and review work`;

  const vs = document.getElementById('viewas');
  vs.innerHTML = RECON.team.map(t=>`<option value="${t.name}" ${t.name===me?'selected':''}>${t.name} — ${roleLabel(t.role)}</option>`).join('');
  vs.onchange = () => { setViewer(vs.value); location.href='home.html'; };

  const ps = prepStats(me), rs = reviewStats(me);
  const kd=[
    {lab:'Assigned to me', num:ps.assigned, bg:'#E6F1FB', stroke:'#185FA5', icon:'<path d="M9 11l3 3 8-8M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h9"/>', foot:`${ps.prepared} prepared`},
    {lab:'To review', num:rs.queue, bg:'#EEEDFE', stroke:'#534AB7', icon:'<circle cx="12" cy="12" r="3"/><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>', foot:can(role,'approve')?`${rs.approved} approved · ${rs.sent_back} sent back`:'you do not approve'},
    {lab:'My prep progress', num:ps.assigned?Math.round(ps.prepared/ps.assigned*100)+'%':'—', cls:'g', bg:'var(--greenbg)', stroke:'#11A150', icon:'<path d="M20 6 9 17l-5-5"/>', foot:`${ps.prepared} of ${ps.assigned}`},
    {lab:'Sent back to me/others', num:rs.sent_back, cls:'a', bg:'var(--amberbg)', stroke:'#C9790B', icon:'<path d="M9 14 4 9l5-5"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>', foot:'need rework', footcls:'a'},
  ];
  document.getElementById('kpis').innerHTML = kd.map(d=>`
    <div class="kpi" style="cursor:default"><div class="lab">${d.lab}</div>
      <div class="row"><div class="num ${d.cls||''}">${d.num}</div><div class="chip" style="background:${d.bg}"><svg viewBox="0 0 24 24" stroke="${d.stroke}" fill="none">${d.icon}</svg></div></div>
      <div class="foot ${d.footcls||''}">${d.foot}</div></div>`).join('');

  const stTag = s => s==='reconciled'?'<span class="tag t-ok">Reconciled</span>':s==='variance'?'<span class="tag t-var">Variance</span>':'<span class="tag t-un">Unreconciled</span>';
  const rvTag = r => `<span class="rv ${r}">${REVIEW_LABELS[r]}</span>`;
  const panel = (title, sub, rows, cols) => `<div class="panel"><div class="ph"><b>${title}</b><span style="margin-left:auto;font-size:12.5px;color:var(--muted);font-weight:600">${sub}</span></div>
    <table><thead><tr>${cols}</tr></thead><tbody>${rows}</tbody></table></div>`;

  let html = '';

  // 1) accounts I'm preparing
  const prepRows = ps.accounts.map(a=>`<tr class="acctrow" onclick="location.href='account.html?id=${a.id}'">
    <td class="acct"><b>${a.name}</b><span>${a.code} · ${a.grp}</span></td><td>${stTag(a.status)}</td>
    <td><span class="ws ${a.work}">${WORK_LABELS[a.work]}</span></td>
    <td class="act"><a class="lnk" href="account.html?id=${a.id}">Prepare →</a></td></tr>`).join('')
    || `<tr><td colspan="4" class="note" style="color:var(--muted);padding:16px 22px">No accounts assigned to you to prepare.</td></tr>`;
  html += panel(`Accounts I'm preparing`, `${ps.assigned} assigned · ${ps.prepared} prepared`, prepRows,
    `<th>Account</th><th>Status</th><th>My progress</th><th class="act">&nbsp;</th>`);

  // 2) accounts I'm reviewing (only if I can approve)
  if(can(role,'approve') && rs.queue){
    const revRows = rs.accounts.map(a=>{
      const acts = a.review==='approved' ? '' :
        `<button class="mini ap" onclick="event.stopPropagation();decide('${a.id}','approved')">Approve</button><button class="mini sb" onclick="event.stopPropagation();decide('${a.id}','sent_back')">Send back</button>`;
      return `<tr class="acctrow" id="rev-${a.id}" onclick="location.href='account.html?id=${a.id}'">
        <td class="acct"><b>${a.name}</b><span>${a.code} · prepared by ${a.assigned}</span></td>
        <td><span class="ws ${a.work}">${WORK_LABELS[a.work]}</span></td>
        <td>${rvTag(a.review)}</td><td class="act">${acts}</td></tr>`;
    }).join('');
    html += panel(`Accounts I'm reviewing`, `${rs.queue} in queue · ${rs.approved} approved · ${rs.sent_back} sent back · ${rs.pending} pending`, revRows,
      `<th>Account</th><th>Preparer's progress</th><th>My review</th><th class="act">&nbsp;</th>`);
  }

  // 3) team workload — only for reviewers (Principal / Director): every accountant
  if(can(role,'review')){
    const order=['director','principal','senior','junior'];
    const rows = order.flatMap(rk=>RECON.team.filter(t=>t.role===rk)).map(t=>{
      const p=prepStats(t.name), r=reviewStats(t.name);
      return `<tr><td class="acct"><b>${t.name}</b><span>${roleLabel(t.role)}</span></td>
        <td class="num"><span class="frac">${p.prepared}<span> / ${p.assigned}</span></span></td>
        <td class="num"><span class="frac">${r.approved}<span> / ${r.queue}</span></span></td>
        <td class="num">${r.sent_back||'—'}</td>
        <td class="num">${r.pending||'—'}</td></tr>`;
    }).join('');
    html += panel(`Team workload`, `all accountants — you oversee the close (${roleLabel(role)})`, rows,
      `<th>Accountant</th><th class="num">Prepared / assigned</th><th class="num">Approved / queue</th><th class="num">Sent back</th><th class="num">Pending</th>`);
  }

  document.getElementById('body').innerHTML = html;

  function applyRow(id, decision){
    const row = document.getElementById('rev-'+id);
    if(!row) return;
    row.querySelector('td:nth-child(3)').innerHTML = rvTag(decision);
    row.querySelector('td.act').innerHTML = decision==='approved'
      ? '<span class="note" style="color:var(--green);font-weight:600;font-size:12.5px">✓ approved</span>'
      : '<span class="note" style="color:var(--amber);font-weight:600;font-size:12.5px">↩ sent back · preparer emailed</span>';
  }
  function decide(id, decision){
    const a = RECON.accounts.find(x=>x.id===id);
    if(decision==='sent_back'){
      // sending back notifies the preparer by email — compose + dispatch
      notifySendBack(a, RECON.viewer, (reason)=>{ a.review='sent_back'; a._sbReason=reason; applyRow(id,'sent_back'); });
      return;
    }
    a.review = decision; applyRow(id, decision);
  }
  window.decide = decide;
</script>
</body>
</html>
