# OpenRecon deployable stack (TEST tier). `docker compose up -d` from this folder.
#   db   — Postgres (GL/recon store, schema + seed auto-applied)
#   api  — FastAPI serving the UI data contract + the reconciliation engine
#   web  — the UI shell (../web), pointed at the API
# Optional bundled DMS + orchestration are documented in docs/DEPLOYMENT.md.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: recon
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
    volumes:
      - ./db:/docker-entrypoint-initdb.d:ro
      - recon-db:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: ..                      # repo root, so the image gets adapters/ too
      dockerfile: stack/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://recon:${DB_PASSWORD:-change-me}@db:5432/recon
      CONFIG_PATH: /config/config.yaml
      PERIOD_END: "2026-05-31"
      IMPORT_DIR: /samples                # historical ETL reads prior-year source files from here
      # Email notifications (send-back alerts to preparers). Defaults to dry-run (compose + log,
      # no SMTP) until NOTIFY_ENABLED=1 and SMTP_* are supplied via the deployment's secret store.
      NOTIFY_ENABLED: "${NOTIFY_ENABLED:-0}"
      NOTIFY_FROM: "${NOTIFY_FROM:-OpenRecon <recon-noreply@localhost>}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_STARTTLS: "${SMTP_STARTTLS:-1}"
    volumes:
      - ./config.example.yaml:/config/config.yaml:ro
      - ./samples:/samples:ro
      - recon-docs:/data/documents
    depends_on: [db]
    ports: ["8002:8000"]
    restart: unless-stopped

  web:
    image: nginx:alpine
    volumes:
      - ../web:/usr/share/nginx/html:ro
    ports: ["8080:80"]
    depends_on: [api]
    restart: unless-stopped

volumes:
  recon-db:
  recon-docs:
